updated_for_target: ascend910b
seed_kernel_scope:
  - apply_rotary_pos_emb
  - grouped_matmul
  - ffn
  - moe_token_permute
  - flash_attention_score
  - matmul_reduce_scatter
gaps:
  - id: ptodsl-rope-generalization
    component: ptodsl
    status: open
    summary: >-
      The apply_rotary_pos_emb seed now runs for both TND and BSND half-mode layouts on 910B, rotary_position_embedding now has a correctness-green PTO slice for BSND and BNSD fp16 half-mode single-route rotary, rotary_position_embedding_grad now has a correctness-green PTO backward slice for BSND and BNSD fp16 half-mode single-route rotary, qkv_rms_norm_rope_cache now has a bounded staged PTO slice for a constrained 2D fp16 q/k/v cache contract, and rope_with_sin_cos_cache now has a correctness-green PTO staged slice for a constrained ND fp16 half-rope cache-read contract. PTODSL still lacks broader rotary-mode coverage and reusable posembedding helpers for the rest of the rope family.
    blocking_kernels:
      - rotary_position_embedding
      - rotary_position_embedding_grad
      - rope_with_sin_cos_cache
      - qkv_rms_norm_rope_cache
  - id: ptodsl-vector-queue-pipeline-surface
    component: ptodsl
    status: open
    summary: >-
      The apply_rotary_pos_emb PTO rewrite now mirrors the upstream per-core contiguous row-chunk ownership for the validated 64-row half-mode seed, but PTODSL still lacks a reusable source-level surface for the upstream vector queue and double-buffer copy/compute overlap used by the AscendC rope kernels.
    blocking_kernels:
      - apply_rotary_pos_emb
      - rotary_position_embedding
      - rotary_position_embedding_grad
      - interleave_rope
  - id: ptodsl-vector-interleave-surface
    component: ptodsl
    status: open
    summary: >-
      The interleave_rope seed is now correctness-green on 910B, but its current PTO path performs the interleave stage with NPU reshape+transpose preprocessing before the PTODSL rotary-half stage. PTODSL still lacks a reusable vector-shuffle or GatherMask-style surface to express the upstream on-device even/odd split and pack directly in PTO source.
    blocking_kernels:
      - interleave_rope
      - qkv_rms_norm_rope_cache
  - id: ptodsl-cache-update-primitives
    component: ptodsl
    status: open
    summary: >-
      The rope_quant_kvcache and dequant_rope_quant_kvcache PTO rewrites no longer depend on torch-side split, dequant, or cache update logic in source, qkv_rms_norm_rope_cache now uses staged PTO rotary plus explicit cache writeback, and rope_with_sin_cos_cache now has a PTO cache-read stage for contiguous cache rows. The current remaining gap is a reusable PTO stack surface for dynamic cache read/write indexing and fused cache-update contracts: the constrained seeds currently rely on explicit in-kernel tcvt plus contiguous tstore and validate only identity row-to-cache lookup (`indices[row] == row` or `positions[row] == row`). Broader split-pack, dynamic index, and fused cache read/write primitives are still missing for the full rope cache family.
    blocking_kernels:
      - rope_quant_kvcache
      - dequant_rope_quant_kvcache
      - qkv_rms_norm_rope_cache
      - rope_with_sin_cos_cache
  - id: ptoisa-a2a3-vec-quant-store
    component: pto-isa
    status: open
    summary: >-
      A2/A3 does not currently expose a native vector-tile quantized store contract through PTO-ISA/PTOAS. Vec TSTORE requires matching source and destination element types, while TSTORE_FP is wired to the accumulator quantized-store path rather than a generic vec -> int8 GM store. The current rope cache seeds therefore use the legal explicit path `tcvt(f16->i8) + tstore(i8)` for cache writeback instead of a fused quantized vec store.
    blocking_kernels:
      - rope_quant_kvcache
      - dequant_rope_quant_kvcache
      - qkv_rms_norm_rope_cache
  - id: ops-transformer-qkv-rms-norm-rope-cache-python-entrypoint-gap
    component: ops-transformer
    status: open
    summary: >-
      This host does not expose a Python-visible `torch_npu.npu_qkv_rms_norm_rope_cache` entrypoint, so the current 910B slice is bounded to PTO-vs-reference until a packaged baseline path exists.
    blocking_kernels:
      - qkv_rms_norm_rope_cache
  - id: ptoas-section-local-scf-parent-terminator
    component: PTOAS
    status: mitigated
    summary: >-
      The earlier PTOAS parent-terminator failure on the section-local `scf.if` / `scf.for` shape inside `pto.section.vector` is mitigated for the checked `qkv_rms_norm_rope_cache` staged slice. The current bounded rope/cache gaps are higher-level PTODSL generalization items such as dynamic cache indexing, vector interleave, and broader rotary/cache surface coverage, not this old PTOAS legality stop.
    blocking_kernels: []
  - id: ptodsl-sparse-attention-primitives
    component: ptodsl
    status: open
    summary: >-
      Missing sparse attention, cache gather/scatter, and advanced masking primitives needed by attention wave 4.
    blocking_kernels:
      - gather_pa_kv_cache
      - kv_quant_sparse_flash_attention
      - sparse_flash_attention
      - nsa_selected_attention
  - id: ptodsl-attention-softmax-primitives
    component: ptodsl
    status: mitigated
    summary: >-
      The dense staged attention path now lives in python/pto_kernels/ops/attention/common.py and the phase-2 PTO rewrite now mirrors ops-transformer host tiling more closely with tiled S1xS2 QK ownership, contiguous row-chunk softmax ownership, and tiled S1xD PV ownership for the validated dense flash_attention_score seed on 910B. Remaining work is online and masked softmax, generalized attention accumulation, and later advanced attention semantics.
    blocking_kernels:
      - flash_attention_score_grad
  - id: ptodsl-attention-update-list-surface
    component: ptodsl
    status: mitigated
    summary: >-
      The checked-in `attention_update` PTO slice is now tile-first and correctness-green on 910B for the constrained `sp=2`, `updateType=0`, fp16 localOut contract with row-wise log-sum-exp merge. Remaining work is broader operator coverage for list-valued SP inputs and the optional `lseOut` branch, not the current seed kernel.
    blocking_kernels:
  - id: ptoas-section-cube-scf-if-terminator
    component: ptoas
    status: mitigated
    summary: >-
      The rebuilt local PTOAS toolchain now accepts the shared dense-attention cube-section `scf.for` form again after keeping section-local `scf.for` / `scf.if` in structured SCF instead of forcing whole-function `SCFToCF` inside `pto.section.cube`. That restores `grouped_matmul`, `flash_attention_score`, and the compile path for the current `fused_infer_attention_score` slice on this host.
    blocking_kernels:
  - id: ptodsl-paged-cache-surface
    component: ptodsl
    status: open
    summary: >-
      The first `fused_infer_attention_score` slice validates the baseline runtime on a constrained single-block cache contract, but broader PTO parity will still need a reusable surface for paged/cache-backed attention layouts beyond the current flattened single-block seed.
    blocking_kernels:
  - id: host-ring-attention-update-python-entrypoint
    component: runtime
    status: open
    summary: >-
      The first `ring_attention_update` PTO slice is correctness-green for a constrained `TND` `N=1` contract, but this 910B host does not expose a Python-visible ring_attention_update runtime entrypoint for baseline parity.
    blocking_kernels:
      - ring_attention_update
  - id: ptodsl-ring-attention-update-list-surface
    component: ptodsl
    status: open
    summary: >-
      The checked-in `ring_attention_update` PTO slice is correctness-green on 910B for two-way row-wise merge with repeated last-dim-8 softmax max/sum tensors, and the current seed is now tile-first with the metadata path expressed through `1x8` tile `row_max` and `row_sum` instead of scalar loads/select in the hot path. Full operator coverage still needs list-valued SP inputs and broader layout support beyond the current fixed `TND`, `N=1` seed.
    blocking_kernels:
      - ring_attention_update
  - id: ptoisa-a3-recurrent-state-update-runtime-hang
    component: pto-isa
    status: open
    summary: >-
      The first `recurrent_gated_delta_rule` bounded slice now has a verified host baseline on A3 for a constrained ND recurrent contract (`batch=1`, `nv=nk=16`, `gk=None`, `actual_seq_lengths` fixed to full length, `ssm_state_indices=arange(T)`). PTODSL and PTOAS now expose the reusable tile surfaces previously missing for the checked slice, including `tgemv` and the column-broadcast binops used by the rank-1 update composition. The direct repro script `scripts/repro_recurrent_stage_runtime.py` proves the prebuilt smoke `stage_proj` artifact executes successfully from `/tmp/recurrent_row_specialized` in about `2.27 ms` and writes `/tmp/recurrent_row_specialized/repro_proj.json`, while the matching direct `stage_state_update_row_000` call still times out under `timeout 20s ... --stage state_update_row_000 --block-dim 1`. The bisect helper `scripts/bisect_recurrent_state_update_runtime.py` narrows the live issue below the arithmetic path: rebuilt `no_exp` and `no_extract_term` variants still time out, and even `minimal_state_store` (`state load -> state store`) plus `minimal_state_roundtrip` (`state load -> f32 -> bf16 -> store`) still time out. The hand-written backend repro `scripts/repro_recurrent_manual_state_store.py` now proves the split is not bf16-specific: `single_row_store_only` succeeds for both bf16 and fp16, but both `single_row_load_only` and the tighter `single_row_roundtrip` (`load -> tcvt -> tcvt -> store`) still time out for both bf16 and fp16 on A3. That rules out `TEXP`, the late `TEXTRACT` addend chain, the higher-level recurrent math, a bf16-only theory, and the destination `TSTORE` path as primary causes; the live blocker is now the A3 minimal vector GM load or load-consumer pipeline contract for this `1x16` VEC row shape.
    blocking_kernels:
      - recurrent_gated_delta_rule
  - id: ptodsl-multicore-collective-primitives
    component: ptodsl
    status: open
    summary: >-
      The matmul_reduce_scatter, all_gather_matmul, grouped_mat_mul_all_reduce, matmul_all_reduce, matmul_all_reduce_add_rms_norm, and inplace_matmul_all_reduce_add_rms_norm PTO seeds now run on the local 2-rank HCCL harness with upstream-like traversal inside the PTO math path, and the first moe_distribute_dispatch and moe_distribute_combine PTO slices now compile for the real A2 contract (`epWorldSize=8`, `H=7168`) as local routing/integration kernels. PTODSL still lacks reusable collective and multicore coordination surface for real MC2 kernel ports, so the current seeds depend on host-orchestrated HCCL collectives outside the PTO kernel boundary. The shared launcher now emits per-rank stage files and the routing workers emit per-rank call traces; those show the 8-rank baseline dispatch path gets through HCCL init and then stalls inside the second warmup `torch_npu.npu_moe_distribute_dispatch` call, while the PTO dispatch path exposed a concrete all_to_all split-contract bug that is now fixed in the runtime. End-to-end 8-rank validation is still blocked until the baseline routing path becomes stable on this host.
    blocking_kernels:
      - all_gather_matmul
      - grouped_mat_mul_all_reduce
      - matmul_all_reduce
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
      - moe_distribute_combine
      - moe_distribute_dispatch
  - id: ptodsl-cube-preload-pipeline-surface
    component: ptodsl
    status: open
    summary: >-
      The grouped_matmul and grouped_matmul_add PTO rewrites now mirror ops-transformer basic-block tiling and diagonal block traversal for constrained dense BF16 -> F32 slices, the first all_gather_matmul seed mirrors the upstream local-first wrapped rank-chunk traversal, and the grouped_mat_mul_all_reduce, matmul_all_reduce, matmul_all_reduce_add_rms_norm, and inplace_matmul_all_reduce_add_rms_norm seeds mirror the upstream splitM/numBlocksN turn loop for dense local cube work, but PTODSL still lacks a reusable source-level surface for async preload, double-buffered cube staging, and callback-style fix-axis/store pipelines. PTOAS autosync covers correctness, not the full overlap strategy used by the upstream AscendC kernels.
    blocking_kernels:
      - grouped_matmul
      - grouped_matmul_add
      - all_gather_matmul
      - matmul_all_reduce
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptoisa-a2a3-tile-runtime-api
    component: pto-isa
    status: mitigated
    summary: >-
      The live `fused_infer_attention_score` stop is no longer the old A2/A3 tile runtime API mismatch. Rewriting the PTO slice onto legal `16x*` cube tiles removed the earlier illegal `8x16` mat/acc shapes, and the current constrained kernel now compiles and benchmarks through Bisheng on this host.
    blocking_kernels: []
  - id: ptodsl-vector-rms-norm-generalization
    component: ptodsl
    status: mitigated
    summary: >-
      The matmul_all_reduce_add_rms_norm and inplace_matmul_all_reduce_add_rms_norm PTO seeds now use a refined PTODSL vector add+rms_norm epilogue over the allreduced matmul output. A Newton-refined rsqrt path brings both kernels within the current correctness contract on the validated 910B seed shapes (`max_abs_diff = 0.00390625` at `atol = rtol = 0.005`). The surface is still constrained to dense fp16 row-wise RMSNorm with fixed hidden size 128 and host-orchestrated collectives, so broader RMSNorm generalization is still open even though the current seeds are no longer blocked.
    blocking_kernels:
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptoisa-a2a3-vector-cast-io
    component: pto-isa
    status: mitigated
    summary: >-
      The current A2/A3 backend still rejects vector TLOAD/TSTORE when the GM dtype and vector tile dtype differ, so backend-legal mixed-precision vector IO is still absent. The current MC2 add+rms_norm seeds are no longer blocked by that limitation because the refined PTODSL epilogue now meets correctness without relying on mixed-dtype vector load/store, but later generalized epilogues may still need backend support here.
    blocking_kernels:
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptodsl-inplace-buffer-alias-contract
    component: ptodsl
    status: open
    summary: >-
      The first inplace_matmul_all_reduce_add_rms_norm PTO slice now validates the inplace contract through a separate epilogue output plus host copy-back into the residual buffer. Native same-buffer aliasing for PTO vector epilogues is not yet validated on this path, so later true inplace ports still need reusable alias-safe lowering or explicit PTODSL/PTOAS support.
    blocking_kernels:
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptodsl-mc2-distributed-launch-contract
    component: ptodsl
    status: resolved
    summary: >-
      The PTO workspace now has a reusable local multi-rank HCCL launch utility in python/pto_kernels/utils/distributed.py, and the phase-1 MC2 seed is wired onto it successfully.
    blocking_kernels: []
  - id: ptoas-a3-legality-diagnostics
    component: PTOAS
    status: mitigated
    summary: >-
      The phase-1 seed audit now confirms all six seed kernels compile and run through the current A2/A3 PTOAS path on 910B. Better verifier coverage and diagnostics remain desirable for later feature bring-up, but they are no longer blocking the current seed program.
    blocking_kernels: []
  - id: ptoas-memory-plan-sync-pipeline
    component: PTOAS
    status: mitigated
    summary: >-
      The current staged seed kernels and the first host-orchestrated MC2 phase-2 slice now run successfully on 910B after removing DSL-level event record/wait pairs from the active PTO sources and relying on PTOAS insert-sync lowering instead. Remaining risk is concentrated in future fused or overlap-heavy ports rather than in the current validated seeds.
    blocking_kernels:
      - swin_attention_ffn
      - all_gather_matmul
  - id: ptoas-python-binding-runtime-abi
    component: PTOAS
    status: open
    summary: >-
      PTOAS now exposes the canonical TileType.to_buffer bridge in source, the capability manifest, the C API, and the rebuilt build-19 Python module, and PTODSL's cross-stack gate now requires that method. The default local Python environment still imports mlir.dialects.pto from ~/.local site-packages, and swapping in the freshly rebuilt _pto module there triggers a duplicate builtin dialect registration, so the new bridge is not yet the active runtime path in the default import environment. PTODSL keeps a compatibility fallback to the old TileBufType constructor until the active MLIR/PTO Python package stack is rebuilt consistently.
    blocking_kernels: []
  - id: ptoisa-a2a3-template-gaps
    component: pto-isa
    status: mitigated
    summary: >-
      The phase-1 seed audit confirms the current A2/A3 template set is sufficient for the runnable seed kernels on 910B. Remaining work is future semantic/performance coverage rather than a present compile blocker.
    blocking_kernels: []
  - id: ptodsl-bf16-epilogue-conversion
    component: ptodsl
    status: resolved
    summary: >-
      The phase-1 seeds that needed bf16/f16 output closure now have working parity paths on 910B, so this is no longer an active blocker in the current migration program.
    blocking_kernels: []
  - id: ptodsl-ffn-interstage-cast-path
    component: ptodsl
    status: mitigated
    summary: >-
      The dense staged FFN path now lives in python/pto_kernels/ops/ffn/common.py and the phase-2 PTO rewrite now mirrors ops-transformer host tiling more closely with baseM/baseN output blocking and per-core tile ownership on both matmul stages for the validated dense relu seed on 910B. Remaining work is fused cube-vector-cube lowering plus a reusable source-level cube preload and overlap surface so later FFN-family kernels do not rely on explicit GM round-trips between stages.
    blocking_kernels:
      - swin_attention_ffn
      - swin_transformer_ln_qkv
      - swin_transformer_ln_qkv_quant
  - id: ops-transformer-swin-ffn-python-entrypoint-gap
