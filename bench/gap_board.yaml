    status: open
    summary: >-
      This host does not expose a torch_npu Python entrypoint for swin_attention_ffn, so the SwinAttentionFFN regression slice is bounded to PTO-vs-reference until a packaged Python-visible baseline path exists.
    blocking_kernels:
      - swin_attention_ffn
  - id: ops-transformer-swin-ln-qkv-python-entrypoint-gap
    component: ops-transformer
    status: open
    summary: >-
      This host does not expose a torch_npu Python entrypoint for swin_transformer_ln_qkv, so the current PTO regression slice is bounded to PTO-vs-reference until a packaged Python-visible baseline path exists. The constrained PTO port itself is now correctness-green on 910B for three fp16 shapes and uses all requested block ids on the nominal 2048-token variant.
    blocking_kernels:
      - swin_transformer_ln_qkv
  - id: ops-transformer-swin-ln-qkv-quant-python-entrypoint-gap
    component: ops-transformer
    status: open
    summary: >-
      This host does not expose a Python-visible baseline entrypoint for swin_transformer_ln_qkv_quant, and the public ACLNN documentation for the packaged operator marks Atlas A2 / 910B unsupported. The kernel is therefore tracked as a bounded blocked slice until either a supported baseline path exists on this machine or the migration program intentionally targets a different product class.
    blocking_kernels:
      - swin_transformer_ln_qkv_quant
  - id: ops-transformer-moe-gating-top-k-softmax-v2-python-entrypoint-gap
    component: ops-transformer
    status: open
    summary: >-
      This host does not expose a Python-visible baseline entrypoint for moe_gating_top_k_softmax_v2 in either `torch_npu` or `torch.ops.npu`, so the current 910B regression slice is bounded to PTO-vs-reference until a packaged Python-visible baseline path exists.
    blocking_kernels:
      - moe_gating_top_k_softmax_v2
  - id: ptoas-emitc-f16-scalar-gating-select
    component: PTOAS
    status: resolved
    summary: >-
      The rebuilt local PTOAS build-19 toolchain now lowers the unrolled `f16` top-1 select shape used by `moe_gating_top_k_softmax_v2` all the way through EmitC/Bisheng. The remaining v2 limitation on this host is baseline availability, not PTO codegen.
    blocking_kernels: []
  - id: ptodsl-swin-ln-qkv-quant-surface
    component: ptodsl
    status: open
    summary: >-
      A real PTO port of SwinTransformerLnQkvQuant needs a reusable PTODSL/PTOAS/pto-isa path for layernorm -> quantize(int8) -> int8 cube matmul with int32 bias -> dequantize -> q/k/v split. That end-to-end quantized Swin path is not yet exposed or validated in the current PTO stack.
    blocking_kernels:
      - swin_transformer_ln_qkv_quant
  - id: ptodsl-swin-layout-shift-surface
    component: ptodsl
    status: open
    summary: >-
      The current PTO SwinAttentionFFN port only covers the zero-shift path. The upstream AscendC kernel also supports nonzero shift1/shift2 remap logic that needs a reusable PTODSL vector remap surface before the full kernel is covered.
    blocking_kernels:
      - swin_attention_ffn
  - id: ptodsl-group-routing-primitives
    component: ptodsl
    status: open
    summary: >-
      Add reusable routing, segmented scheduling, and group-list helpers for grouped GEMM and MoE kernels instead of encoding group semantics ad hoc in each port.
    blocking_kernels:
      - grouped_matmul
      - grouped_matmul_finalize_routing
      - moe_re_routing
  - id: ptoas-scf-routing-emit
    component: PTOAS
    status: mitigated
    summary: >-
      The earlier section-local SCF EmitC stop for the checked Wave-2 routing seeds is mitigated on the local A3 toolchain. `moe_re_routing` is now compile-time-unrolled through PTODSL and `moe_init_routing_v2` now builds and benchmarks with the rebuilt local PTOAS path. Remaining routing work is kernel generalization and scalar-hot-path cleanup, not this old PTOAS emission failure.
    blocking_kernels: []
  - id: ops-transformer-moe-init-routing-v2-host-crash
    component: ops-transformer
    status: open
    summary: >-
      The Python-visible `torch.ops.npu.npu_moe_init_routing_v2` entrypoint segfaults on this host for the validated dropless top-1 grouped-expert probe, so the current `moe_init_routing_v2` slice is bounded by a host-runtime crash before baseline parity can be measured.
    blocking_kernels:
      - moe_init_routing_v2
  - id: pto-multiblock-scalar-gm-routing
    component: pto-isa
    status: mitigated
    summary: >-
      The earlier multiblock scalar-GM corruption in `moe_compute_expert_tokens` is mitigated by keeping the running upper-bound position as an SSA loop-carried scalar and writing it back to GM once per expert instead of round-tripping through `pto.load_scalar` / `pto.store_scalar` on every row. The remaining routing kernels that still use scalar-control-heavy GM update patterns should prefer the same loop-carried form before asking for backend changes.
    blocking_kernels: []
  - id: ptodsl-routing-sort-primitives
    component: ptodsl
    status: open
    summary: >-
      The moe_token_permute seed now runs with contiguous per-core token-row ownership and a host-precomputed gather map on 910B, the moe_token_permute_grad seed now matches the current Python-visible top-1 no-probs host contract with direct sorted-index row gathers in PTODSL, the moe_token_permute_with_routing_map seed now matches the Python-visible top-1 routing-map contract with contiguous per-core row ownership plus host-precomputed gather and inverse-order maps, the moe_token_permute_with_routing_map_grad seed now matches the Python-visible top-1 routing-map backward contract with direct sorted-index row stores in PTODSL, the moe_token_unpermute seed now restores top-1 no-probs tokens with the same contiguous per-core token-row ownership and a host-precomputed inverse gather map, the moe_token_unpermute_with_routing_map seed now matches the Python-visible top-1 routing-map unpermute contract with contiguous per-core row ownership plus a host-precomputed gather map, the moe_token_unpermute_grad seed now writes top-1 no-probs gradient rows back with direct scalar routing indices and row-at-a-time GM stores, the moe_token_unpermute_with_routing_map_grad seed now matches the Python-visible top-1 routing-map backward contract with direct out-index row stores in PTODSL, the moe_finalize_routing seed now combines top-1 rows with direct scalar routing indices for expanded rows and expert bias rows, the moe_finalize_routing_v2 seed now extends that combine path with the second shared expert addend and validates the documented `x1 + x2 + scale * (expandedX[row] + bias[expert])` top-1 contract in PTODSL, the moe_finalize_routing_v2_grad seed now emits the matching top-1 backward slice with dynamic gradExpandedX row scatter and row_sum-based gradScales reduction, the moe_compute_expert_tokens PTO slice now expresses contiguous per-core expert-range ownership and direct upper-bound position search in PTODSL, the first moe_init_routing PTO slice now runs on the real `row_idx/expert_idx` contract for the top-1 case where `expert_idx` is already grouped by expert, the first moe_init_routing_v2 PTO slice now runs on the real dropless `moe_init_routing_v2` host contract for the top-1 grouped-expert case and produces expanded rows plus expert count/cumsum outputs in PTODSL, the first moe_distribute_dispatch PTO slice now compiles as a destination-major local send-buffer pack for the real `8 x 7168` A2 contract via a flattened gather-map stopgap, and the first moe_distribute_combine PTO slice now compiles and passes a local single-rank smoke via host-precompacted reverse-route buffers plus chunk-local flattened scatter indices. MoE routing kernels still need reusable on-device sort, inverse-permutation, group-count, and reorder/scatter primitives so later ports do not depend on host-side preprocessing or oversized flattened gather maps.
    blocking_kernels:
      - moe_finalize_routing
      - moe_finalize_routing_v2
      - moe_finalize_routing_v2_grad
      - moe_token_permute_grad
      - moe_token_permute
      - moe_token_permute_with_routing_map
      - moe_token_permute_with_routing_map_grad
      - moe_distribute_combine
      - moe_token_unpermute
      - moe_token_unpermute_with_routing_map
      - moe_token_unpermute_with_routing_map_grad
      - moe_init_routing
  - id: ptoas-emitc-form-expressions
    component: PTOAS
    status: mitigated
    summary: >-
