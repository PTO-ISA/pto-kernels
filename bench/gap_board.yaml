updated_for_target: ascend910b
seed_kernel_scope:
  - apply_rotary_pos_emb
  - grouped_matmul
  - ffn
  - moe_token_permute
  - flash_attention_score
  - matmul_reduce_scatter
gaps:
  - id: ptodsl-rope-generalization
    component: ptodsl
    status: open
    summary: The apply_rotary_pos_emb seed now runs for both TND and BSND half-mode layouts on 910B, but PTODSL still lacks broader rotary-mode coverage and reusable posembedding helpers for the rest of the rope family.
    blocking_kernels:
      - rotary_position_embedding
      - rope_with_sin_cos_cache
  - id: ptodsl-vector-queue-pipeline-surface
    component: ptodsl
    status: open
    summary: The apply_rotary_pos_emb PTO rewrite now mirrors the upstream per-core contiguous row-chunk ownership for the validated 64-row half-mode seed, but PTODSL still lacks a reusable source-level surface for the upstream vector queue and double-buffer copy/compute overlap used by the AscendC rope kernels.
    blocking_kernels:
      - apply_rotary_pos_emb
      - rotary_position_embedding
  - id: ptodsl-sparse-attention-primitives
    component: ptodsl
    status: open
    summary: Missing sparse attention, cache gather/scatter, and advanced masking primitives needed by attention wave 4.
    blocking_kernels:
      - gather_pa_kv_cache
      - kv_quant_sparse_flash_attention
      - sparse_flash_attention
      - nsa_selected_attention
  - id: ptodsl-attention-softmax-primitives
    component: ptodsl
    status: mitigated
    summary: The dense staged attention path now lives in python/pto_kernels/ops/attention/common.py and the phase-2 PTO rewrite now mirrors ops-transformer host tiling more closely with tiled S1xS2 QK ownership, contiguous row-chunk softmax ownership, and tiled S1xD PV ownership for the validated dense flash_attention_score seed on 910B. Remaining work is online and masked softmax, generalized attention accumulation, and later advanced attention semantics.
    blocking_kernels:
      - flash_attention_score_grad
      - prompt_flash_attention
  - id: ptodsl-multicore-collective-primitives
    component: ptodsl
    status: open
    summary: The matmul_reduce_scatter, all_gather_matmul, grouped_mat_mul_all_reduce, matmul_all_reduce, matmul_all_reduce_add_rms_norm, and inplace_matmul_all_reduce_add_rms_norm PTO seeds now run on the local 2-rank HCCL harness with upstream-like traversal inside the PTO math path, and the first moe_distribute_dispatch and moe_distribute_combine PTO slices now compile for the real A2 contract (`epWorldSize=8`, `H=7168`) as local routing/integration kernels. PTODSL still lacks reusable collective and multicore coordination surface for real MC2 kernel ports, so the current seeds depend on host-orchestrated HCCL collectives outside the PTO kernel boundary. The shared launcher now emits per-rank stage files and the routing workers emit per-rank call traces; those show the 8-rank baseline dispatch path gets through HCCL init and then stalls inside the second warmup `torch_npu.npu_moe_distribute_dispatch` call, while the PTO dispatch path exposed a concrete all_to_all split-contract bug that is now fixed in the runtime. End-to-end 8-rank validation is still blocked until the baseline routing path becomes stable on this host.
    blocking_kernels:
      - all_gather_matmul
      - grouped_mat_mul_all_reduce
      - matmul_all_reduce
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
      - moe_distribute_combine
      - moe_distribute_dispatch
  - id: ptodsl-cube-preload-pipeline-surface
    component: ptodsl
    status: open
    summary: The grouped_matmul PTO rewrite now mirrors ops-transformer basic-block tiling and diagonal block traversal, the first all_gather_matmul seed mirrors the upstream local-first wrapped rank-chunk traversal, and the grouped_mat_mul_all_reduce, matmul_all_reduce, matmul_all_reduce_add_rms_norm, and inplace_matmul_all_reduce_add_rms_norm seeds mirror the upstream splitM/numBlocksN turn loop for dense local cube work, but PTODSL still lacks a reusable source-level surface for async preload, double-buffered cube staging, and callback-style fix-axis/store pipelines. PTOAS autosync covers correctness, not the full overlap strategy used by the upstream AscendC kernels.
    blocking_kernels:
      - grouped_matmul
      - grouped_matmul_add
      - all_gather_matmul
      - matmul_all_reduce
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptodsl-vector-rms-norm-generalization
    component: ptodsl
    status: mitigated
    summary: The matmul_all_reduce_add_rms_norm and inplace_matmul_all_reduce_add_rms_norm PTO seeds now use a refined PTODSL vector add+rms_norm epilogue over the allreduced matmul output. A Newton-refined rsqrt path brings both kernels within the current correctness contract on the validated 910B seed shapes (`max_abs_diff = 0.00390625` at `atol = rtol = 0.005`). The surface is still constrained to dense fp16 row-wise RMSNorm with fixed hidden size 128 and host-orchestrated collectives, so broader RMSNorm generalization is still open even though the current seeds are no longer blocked.
    blocking_kernels:
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptoisa-a2a3-vector-cast-io
    component: pto-isa
    status: mitigated
    summary: The current A2/A3 backend still rejects vector TLOAD/TSTORE when the GM dtype and vector tile dtype differ, so backend-legal mixed-precision vector IO is still absent. The current MC2 add+rms_norm seeds are no longer blocked by that limitation because the refined PTODSL epilogue now meets correctness without relying on mixed-dtype vector load/store, but later generalized epilogues may still need backend support here.
    blocking_kernels:
      - matmul_all_reduce_add_rms_norm
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptodsl-inplace-buffer-alias-contract
    component: ptodsl
    status: open
    summary: The first inplace_matmul_all_reduce_add_rms_norm PTO slice now validates the inplace contract through a separate epilogue output plus host copy-back into the residual buffer. Native same-buffer aliasing for PTO vector epilogues is not yet validated on this path, so later true inplace ports still need reusable alias-safe lowering or explicit PTODSL/PTOAS support.
    blocking_kernels:
      - inplace_matmul_all_reduce_add_rms_norm
  - id: ptodsl-mc2-distributed-launch-contract
    component: ptodsl
    status: resolved
    summary: The PTO workspace now has a reusable local multi-rank HCCL launch utility in python/pto_kernels/utils/distributed.py, and the phase-1 MC2 seed is wired onto it successfully.
    blocking_kernels: []
  - id: ptoas-a3-legality-diagnostics
    component: PTOAS
    status: mitigated
    summary: The phase-1 seed audit now confirms all six seed kernels compile and run through the current A2/A3 PTOAS path on 910B. Better verifier coverage and diagnostics remain desirable for later feature bring-up, but they are no longer blocking the current seed program.
    blocking_kernels: []
  - id: ptoas-memory-plan-sync-pipeline
    component: PTOAS
    status: mitigated
    summary: The current staged seed kernels and the first host-orchestrated MC2 phase-2 slice now run successfully on 910B after removing DSL-level event record/wait pairs from the active PTO sources and relying on PTOAS insert-sync lowering instead. Remaining risk is concentrated in future fused or overlap-heavy ports rather than in the current validated seeds.
    blocking_kernels:
      - swin_attention_ffn
      - prompt_flash_attention
      - all_gather_matmul
  - id: ptoisa-a2a3-template-gaps
    component: pto-isa
    status: mitigated
    summary: The phase-1 seed audit confirms the current A2/A3 template set is sufficient for the runnable seed kernels on 910B. Remaining work is future semantic/performance coverage rather than a present compile blocker.
    blocking_kernels: []
  - id: ptodsl-bf16-epilogue-conversion
    component: ptodsl
    status: resolved
    summary: The phase-1 seeds that needed bf16/f16 output closure now have working parity paths on 910B, so this is no longer an active blocker in the current migration program.
    blocking_kernels: []
  - id: ptodsl-ffn-interstage-cast-path
    component: ptodsl
    status: mitigated
    summary: The dense staged FFN path now lives in python/pto_kernels/ops/ffn/common.py and the phase-2 PTO rewrite now mirrors ops-transformer host tiling more closely with baseM/baseN output blocking and per-core tile ownership on both matmul stages for the validated dense relu seed on 910B. Remaining work is fused cube-vector-cube lowering plus a reusable source-level cube preload and overlap surface so later FFN-family kernels do not rely on explicit GM round-trips between stages.
    blocking_kernels:
      - swin_attention_ffn
      - swin_transformer_ln_qkv
      - swin_transformer_ln_qkv_quant
  - id: ptodsl-group-routing-primitives
    component: ptodsl
    status: open
    summary: Add reusable routing, segmented scheduling, and group-list helpers for grouped GEMM and MoE kernels instead of encoding group semantics ad hoc in each port.
    blocking_kernels:
      - grouped_matmul
      - grouped_matmul_finalize_routing
  - id: ptodsl-routing-sort-primitives
    component: ptodsl
    status: open
    summary: The moe_token_permute seed now runs with contiguous per-core token-row ownership and a host-precomputed gather map on 910B, the first moe_distribute_dispatch PTO slice now compiles as a destination-major local send-buffer pack for the real `8 x 7168` A2 contract via a flattened gather-map stopgap, and the first moe_distribute_combine PTO slice now compiles and passes a local single-rank smoke via host-precompacted reverse-route buffers plus chunk-local flattened scatter indices. MoE routing kernels still need reusable on-device sort, inverse-permutation, group-count, and reorder/scatter primitives so later ports do not depend on host-side preprocessing or oversized flattened gather maps.
    blocking_kernels:
      - moe_distribute_combine
      - moe_token_unpermute
      - moe_init_routing
  - id: ops-transformer-runtime-package-bringup
    component: ops-transformer
    status: mitigated
    summary: The seed package now builds successfully against the local CANN 9.0.0-beta.1 stack and installs into vendors/custom_transformer under the active toolkit root, so package-level baseline bring-up is no longer the active environment blocker.
    blocking_kernels: []
  - id: ops-transformer-grouped-matmul-v5-shape-contract
    component: ops-transformer
    status: resolved
    summary: The grouped_matmul seed baseline now uses a single 3D weight tensor so it satisfies aclnnGroupedMatmulV5 on this host and can run side-by-side with the PTO seed in the benchmark harness.
    blocking_kernels: []
  - id: ops-transformer-build-metadata-layout
    component: ops-transformer
    status: mitigated
    summary: The local CANN package path does not expose the share/info/*/version.info metadata expected by ops-transformer package builds, but the PTO workspace now synthesizes a compatible package root under build/ops_transformer_cann_compat so seed builds can reach CMake and compilation.
    blocking_kernels: []
  - id: ops-transformer-cann-open-api-gap
    component: ops-transformer
    status: resolved
    summary: Upgrading the local toolkit to CANN 9.0.0-beta.1 resolved the missing GERT stride/view APIs and PlatformAscendC NPU-arch helpers that previously blocked ops-transformer host compilation on this machine.
    blocking_kernels: []
  - id: ops-transformer-mc2-hccl-multirank-bringup
    component: ops-transformer
    status: mitigated
    summary: The PTO workspace now provides a local multi-rank HCCL launch path for MC2 baseline benchmarks, and matmul_reduce_scatter, all_gather_matmul, grouped_mat_mul_all_reduce, and matmul_all_reduce all run correctly on a 2-rank local harness. The first moe_distribute_dispatch and moe_distribute_combine baseline slices are now wired for the real A2 contract (`epWorldSize=8`, `H=7168`), and the launcher now fails fast with a timeout instead of hanging indefinitely. Per-rank stage traces plus worker traces show the 8-rank baseline dispatch path reaches the worker body after HCCL init and then stalls inside the second warmup `torch_npu.npu_moe_distribute_dispatch` call, so remaining MC2 baseline work is now concentrated in that routing bring-up rather than in basic package installation.
    blocking_kernels:
      - all_gather_matmul
      - grouped_mat_mul_all_reduce
      - matmul_all_reduce
      - moe_distribute_combine
      - moe_distribute_combine_v2
      - moe_distribute_dispatch
      - moe_distribute_dispatch_v2
      - moe_distribute_dispatch_v3
